basePath: /
definitions:
  github_com_danielcaso_mini-blockchain_internal_blockchain.Block:
    properties:
      data:
        example: Hello Blockchain
        type: string
      hash:
        example: 0000fedcba0987654321
        type: string
      index:
        example: 1
        type: integer
      nonce:
        example: 12345
        type: integer
      prev_hash:
        example: 0000abcdef1234567890
        type: string
      timestamp:
        example: "2024-01-01T00:00:00Z"
        type: string
    type: object
  internal_api.ChainResponse:
    properties:
      chain:
        items:
          $ref: '#/definitions/github_com_danielcaso_mini-blockchain_internal_blockchain.Block'
        type: array
      difficulty:
        example: 2
        type: integer
      length:
        example: 5
        type: integer
    type: object
  internal_api.ErrorResponse:
    properties:
      error:
        example: something went wrong
        type: string
    type: object
  internal_api.HealthResponse:
    properties:
      status:
        example: ok
        type: string
    type: object
  internal_api.MineRequest:
    properties:
      data:
        example: Hello Blockchain
        type: string
    required:
    - data
    type: object
  internal_api.ValidateResponse:
    properties:
      valid:
        example: true
        type: boolean
    type: object
host: localhost:8080
info:
  contact: {}
  description: A minimal blockchain implementation in Go with REST API.
  title: Mini Blockchain API
  version: "1.0"
paths:
  /block/{id}:
    get:
      description: Returns a single block from the blockchain by its numeric index
        (0 = genesis block)
      operationId: get-block-by-id
      parameters:
      - description: Block index
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_danielcaso_mini-blockchain_internal_blockchain.Block'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      summary: Get a block by index
      tags:
      - blockchain
  /chain:
    get:
      description: Returns all blocks in the blockchain, including total length and
        current mining difficulty
      operationId: get-chain
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.ChainResponse'
      summary: Get the full blockchain
      tags:
      - blockchain
  /health:
    get:
      description: Returns the current health status of the API server
      operationId: health-check
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.HealthResponse'
      summary: Health check
      tags:
      - system
  /mine:
    post:
      consumes:
      - application/json
      description: Creates and mines a new block with the provided data using Proof
        of Work. The block is appended to the chain and persisted to the database
      operationId: mine-block
      parameters:
      - description: Block data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api.MineRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_danielcaso_mini-blockchain_internal_blockchain.Block'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      summary: Mine a new block
      tags:
      - blockchain
  /validate:
    get:
      description: Verifies the integrity of the entire blockchain by checking hashes,
        links, and proof of work for every block
      operationId: validate-chain
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.ValidateResponse'
      summary: Validate chain integrity
      tags:
      - blockchain
swagger: "2.0"
